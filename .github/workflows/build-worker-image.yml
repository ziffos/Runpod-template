name: Build Worker Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-worker-image.yml"
      - "Dockerfile"
      - "handler.py"
      - "requirements.txt"
      - "src/**"
      - "start_vast_serverless.sh"
      - "vast_worker.py"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push RunPod image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runpod
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Vast image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: vast
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:vast-latest
            ${{ env.IMAGE_NAME }}:vast-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
